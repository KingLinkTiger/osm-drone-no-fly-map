<div id="map" style="height: 100vh;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  .ceiling-label {
    background: transparent;
    border: none;
    box-shadow: none;
    color: #111;
    font-size: 12px;
    font-weight: 600;
    text-shadow: 0 0 3px #fff, 0 0 3px #fff;
  }
</style>

<script>
const map = L.map('map').setView([38.9072, -77.0369], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const faaUrl = 'https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/arcgis/rest/services/FAA_UAS_FacilityMap_Data/FeatureServer/0/query';
const nsUrl = 'https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/arcgis/rest/services/DoD_Mar_13/FeatureServer/0/query';
const airportUrl = 'https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services/US_Airport/FeatureServer/0/query';
const tfrUrl = 'https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services/National_Defense_Airspace_TFR_Areas/FeatureServer/0/query';
const pageSize = 2000;
const labelZoom = 12;

const faaGroup = L.layerGroup([L.geoJSON(null, {
  style: { color: '#3388ff', weight: 1, fillOpacity: 0.2 }
}), L.layerGroup()]);

const nsGroup = L.geoJSON(null, {
  style: { color: '#d7191c', weight: 1, fillOpacity: 0.15 },
  onEachFeature: (feature, layer) => {
    const p = feature.properties || {};
    const content = `
      <div style="min-width: 200px">
        <b>Proponent:</b> ${p.Proponent || 'N/A'}<br>
        <b>Reason:</b> ${p.Reason || 'N/A'}<br>
        <b>SITE:</b> ${p.SITE || 'N/A'}<br>
        <b>Base:</b> ${p.Base || 'N/A'}<br>
        <b>Branch:</b> ${p.Branch || 'N/A'}
      </div>
    `;
    layer.bindPopup(content);
  }
});

const airportGroup = L.geoJSON(null, {
  pointToLayer: (feature, latlng) => {
    return L.circleMarker(latlng, {
      radius: 4,
      fillColor: '#2ca02c',
      color: '#fff',
      weight: 1,
      opacity: 1,
      fillOpacity: 0.8
    });
  },
  onEachFeature: (feature, layer) => {
    const p = feature.properties || {};
    const name = p.NAME || p.name || p.AIRPORT_NAME || 'Airport';
    layer.bindPopup(`<b>${name}</b>`);
  }
});

const tfrGroup = L.geoJSON(null, {
  style: { color: '#fdae61', weight: 2, fillOpacity: 0.1 },
  onEachFeature: (feature, layer) => {
    const p = feature.properties || {};
    const name = p.NAME || p.name || p.DESCRIPTION || 'TFR Area';
    layer.bindPopup(`<b>${name}</b>`);
  }
});

let faaGeojson = null;

function toQuery(params) {
  return new URLSearchParams(params).toString();
}

function boundsToArcGISExtent(bounds) {
  const sw = bounds.getSouthWest();
  const ne = bounds.getNorthEast();
  return {
    xmin: sw.lng,
    ymin: sw.lat,
    xmax: ne.lng,
    ymax: ne.lat,
    spatialReference: { wkid: 4326 }
  };
}

async function fetchVisibleFeatures(layerUrl) {
  const bounds = map.getBounds();
  const extent = boundsToArcGISExtent(bounds);
  let allFeatures = [];
  let offset = 0;

  while (true) {
    const url = `${layerUrl}?${toQuery({
      f: 'geojson',
      where: '1=1',
      outFields: '*',
      returnGeometry: 'true',
      geometry: JSON.stringify(extent),
      geometryType: 'esriGeometryEnvelope',
      spatialRel: 'esriSpatialRelIntersects',
      inSR: '4326',
      outSR: '4326',
      resultOffset: offset,
      resultRecordCount: pageSize,
      orderByFields: 'OBJECTID ASC'
    })}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error(`Request failed: ${res.status}`);

    const data = await res.json();
    if (!data.features || data.features.length === 0) break;
    allFeatures.push(...data.features);

    if (data.features.length < pageSize) break;
    offset += pageSize;
  }

  return { type: 'FeatureCollection', features: allFeatures };
}

function updateLabels() {
  const labels = faaGroup.getLayers()[1];
  labels.clearLayers();

  if (map.getZoom() < labelZoom) return;

  faaGeojson?.features?.forEach(feature => {
    const ceiling = feature.properties?.CEILING;
    if (ceiling == null) return;

    const temp = L.geoJSON(feature);
    const center = temp.getBounds().getCenter();

    labels.addLayer(
      L.marker(center, {
        interactive: false,
        icon: L.divIcon({
          className: 'ceiling-label',
          html: String(ceiling),
          iconSize: [0, 0]
        })
      })
    );
  });
}

async function reloadAll() {
  try {
    faaGeojson = await fetchVisibleFeatures(faaUrl);
    const nsGeojson = await fetchVisibleFeatures(nsUrl);
    const airportGeojson = await fetchVisibleFeatures(airportUrl);
    const tfrGeojson = await fetchVisibleFeatures(tfrUrl);

    faaGroup.getLayers()[0].clearLayers();
    faaGroup.getLayers()[0].addData(faaGeojson);

    nsGroup.clearLayers();
    nsGroup.addData(nsGeojson);

    airportGroup.clearLayers();
    airportGroup.addData(airportGeojson);

    tfrGroup.clearLayers();
    tfrGroup.addData(tfrGeojson);

    updateLabels();
  } catch (err) {
    console.error(err);
  }
}

let timer = null;
function scheduleReload() {
  clearTimeout(timer);
  timer = setTimeout(reloadAll, 300);
}

map.on('moveend', scheduleReload);

map.on('zoomend', updateLabels);

const overlays = {
  'FAA FacilityMap (with CEILING)': faaGroup,
  'National Security UAS Flight Restrictions': nsGroup,
  'US Airports': airportGroup,
  'National Defense TFRs': tfrGroup
};

L.control.layers(null, overlays, { position: 'topright' }).addTo(map);

reloadAll();
</script>
