<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="origin-when-cross-origin" />
  <title>Drone No-Fly Zones</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100vh; width: 100%; }
    .toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      font-family: sans-serif;
      width: 280px;
    }
    .toolbar input, .toolbar button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      padding: 8px;
    }
    .note { font-size: 12px; color: #555; margin-top: 8px; line-height: 1.3; }
    .popup-title { font-weight: 700; margin-bottom: 4px; }
    .feature-label {
      pointer-events: none;
      font-weight: 700;
      background: rgba(255,255,255,0.9);
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.12);
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      font-size: 12px;
      color: #000;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div><strong>Drone No-Fly Zones</strong></div>
    <input id="searchInput" type="text" placeholder="Search a location..." />
    <button id="searchBtn">Search</button>
    <button id="resetBtn">Reset View</button>
    <label style="display:block;margin-top:8px; font-size:13px;">
      <input id="labelsToggle" type="checkbox" checked /> Show CEILING labels
    </label>
    <div class="note">
      Red overlays show source-reported drone restriction zones from FAA, EASA, and DJI.
    </div>
  </div>

  <div id="map"></div>

  <!-- SVG defs for fill patterns (kept hidden) -->
  <svg id="svg-patterns" style="position: absolute; width:0; height:0; pointer-events: none;">
    <defs></defs>
  </svg>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    (async () => {
    const map = L.map('map', { zoomControl: true }).setView([20, 0], 2);

    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const style = {
      color: '#b30000',
      weight: 1,
      fillColor: '#ff0000',
      fillOpacity: 0.35
    };
    const LABEL_MIN_ZOOM = 10; // labels hidden when map zoom is below this

    // overlays container (declared early so viewport loader and label updater can reference it)
    const overlays = {};
    // label toggle and cache config
    let LABELS_ENABLED = true;
    const ARC_CACHE = new Map();
    const ARC_CACHE_GRID_DEG = 0.5; // 0.5 degree tiles for caching

    function popupHTML(props) {
      return `
        <div class="popup-title">${props.name || 'Restricted Zone'}</div>
        <div><b>Authority:</b> ${props.authority || 'Unknown'}</div>
        <div><b>Restriction:</b> ${props.restriction_type || 'Restricted'}</div>
        <div><b>Details:</b> ${props.description || 'No details provided.'}</div>
        <div><b>Effective:</b> ${props.effective_date || 'Unknown'}</div>
        <div style="margin-top:6px;">
          <a href="${props.source_url || '#'}" target="_blank" rel="noopener">Source</a>
        </div>
      `;
    }

    // helper: compute tile x/y indices covering bbox
    function tilesForBbox(bbox, grid) {
      const [xmin, ymin, xmax, ymax] = bbox;
      const x0 = Math.floor(xmin / grid);
      const x1 = Math.floor(xmax / grid);
      const y0 = Math.floor(ymin / grid);
      const y1 = Math.floor(ymax / grid);
      const tiles = [];
      for (let x = x0; x <= x1; x++) for (let y = y0; y <= y1; y++) tiles.push([x, y]);
      return tiles;
    }

    function tileBbox(x, y, grid) {
      return [x * grid, y * grid, (x + 1) * grid, (y + 1) * grid];
    }

    function tileKey(x, y) { return `${x}_${y}`; }

    async function fetchArcgisTile(baseUrl, x, y) {
      const key = tileKey(x, y);
      if (ARC_CACHE.has(key)) return ARC_CACHE.get(key);
      const bbox = tileBbox(x, y, ARC_CACHE_GRID_DEG);
      try {
        const data = await fetchArcgisBBox(baseUrl, bbox);
        ARC_CACHE.set(key, data);
        return data;
      } catch (e) {
        console.warn('fetchArcgisTile failed', key, e);
        ARC_CACHE.set(key, { type: 'FeatureCollection', features: [] });
        return ARC_CACHE.get(key);
      }
    }

    function colorId(color) {
      return String(color).replace('#', '').replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
    }

    function ensureStripedPattern(color) {
      const id = 'stripe-' + colorId(color);
      // check existing
      if (document.getElementById(id)) return id;
      const defs = document.querySelector('#svg-patterns defs');
      if (!defs) return id;

      const svgNS = 'http://www.w3.org/2000/svg';
      const pattern = document.createElementNS(svgNS, 'pattern');
      pattern.setAttribute('id', id);
      pattern.setAttribute('patternUnits', 'userSpaceOnUse');
      pattern.setAttribute('width', '8');
      pattern.setAttribute('height', '8');
      pattern.setAttribute('patternTransform', 'rotate(45)');

      const rectBg = document.createElementNS(svgNS, 'rect');
      rectBg.setAttribute('width', '8');
      rectBg.setAttribute('height', '8');
      rectBg.setAttribute('fill', 'transparent');

      const rectStripe = document.createElementNS(svgNS, 'rect');
      rectStripe.setAttribute('width', '4');
      rectStripe.setAttribute('height', '8');
      rectStripe.setAttribute('fill', color);

      pattern.appendChild(rectBg);
      pattern.appendChild(rectStripe);
      defs.appendChild(pattern);
      return id;
    }

    async function loadGeoJSON(url, label) {
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Failed to load ${label}`);
        const data = await res.json();

        return L.geoJSON(data, {
          style: (feature) => {
            const props = (feature && feature.properties) || {};
            return {
              color: props.color || '#b30000',
              weight: 1,
              fillColor: props.color || '#ff0000',
              fillOpacity: (props.fillOpacity !== undefined) ? props.fillOpacity : 0.35
            };
          },
          pointToLayer: (feature, latlng) => {
            const props = (feature && feature.properties) || {};
            if (feature && feature.geometry && feature.geometry.type === 'Point' && props.radius_m) {
              const c = L.circle(latlng, {
                radius: Number(props.radius_m) || 0,
                color: props.color || '#b30000',
                weight: 2,
                fillColor: props.color || '#ff0000',
                fillOpacity: (props.fillOpacity !== undefined) ? props.fillOpacity : 0.28
              });
              const pid = props.pattern === 'striped' ? ensureStripedPattern(props.color || '#ff0000') : null;
              c.once('add', () => {
                const el = c.getElement();
                if (!el) return;
                if (pid) {
                  el.setAttribute('fill', `url(#${pid})`);
                } else {
                  // non-striped: bring to front so it appears above striped rings
                  c.bringToFront();
                }
              });
              return c;
            }
            return L.marker(latlng);
          },
          onEachFeature: (feature, lyr) => {
            const props = feature.properties || {};
            // Bind a popup that shows common fields and a fallback that prints all properties
            lyr.bindPopup(popupHTML(props) + `<pre style="max-width:320px;margin-top:6px;">${JSON.stringify(props,null,2)}</pre>`, { maxWidth: 400 });

            // After the layer is added to the map, apply pattern fills for polygons or bring non-striped to front
            lyr.once('add', () => {
              const el = lyr.getElement && lyr.getElement();
              // if it's a vector SVG element
              if (el) {
                if (props.pattern === 'striped') {
                  const pid = ensureStripedPattern(props.color || '#ff0000');
                  el.setAttribute('fill', `url(#${pid})`);
                } else {
                  // non-striped: bring polygon/shape to front so it appears above striped ones
                  if (lyr.bringToFront) lyr.bringToFront();
                }
              }

              // If this feature has a CEILING property and it's a polygon/multipolygon, place a centered label
              try {
                const geomType = feature && feature.geometry && feature.geometry.type;
                if ((geomType === 'Polygon' || geomType === 'MultiPolygon') && props.CEILING !== undefined && props.CEILING !== null && String(props.CEILING).trim() !== '') {
                  // compute a center; using bounds center is robust for MultiPolygons
                  const center = (lyr.getBounds && lyr.getBounds().getCenter()) || null;
                          if (center) {
                            const label = L.marker(center, {
                              interactive: false,
                              keyboard: false,
                              icon: L.divIcon({
                                className: 'feature-label',
                                html: `<div>${String(props.CEILING)}</div>`
                              })
                            });
                            // remember label so it can be removed with the layer
                            lyr._ceilingLabel = label;
                            lyr.on('remove', () => { if (lyr._ceilingLabel) map.removeLayer(lyr._ceilingLabel); });
                            // add label only if enabled and zoom high enough
                            if (LABELS_ENABLED && map.getZoom() >= LABEL_MIN_ZOOM) map.addLayer(lyr._ceilingLabel);
                          }
                }
              } catch (e) {
                console.warn('Failed to add CEILING label', e);
              }
            });
          }
        });
      } catch (err) {
        console.warn(err.message);
        return null;
      }
    }

    // FAA Layers https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services

    // load layers (missing files will be skipped)
    const testLayer = await loadGeoJSON('./test.geojson', 'Test');
    // We'll load the FAA ArcGIS dataset by viewport (bbox) to avoid the server-side 2000 feature cap
    // Create an empty layer group to hold features fetched for the current viewport
    const FAA_UAS_FacilityMap_Data_layer = L.layerGroup();
    // Start by fetching the current viewport
    const ARC_GIS_BASE = 'https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/arcgis/rest/services/FAA_UAS_FacilityMap_Data/FeatureServer/0/query';
    const easaLayer = await loadGeoJSON('./easa.geojson', 'EASA');
    const djiLayer = await loadGeoJSON('./dji.geojson', 'DJI');

    // Helper: fetch ArcGIS geojson for a bounding box (lon/lat, xmin,ymin,xmax,ymax)
    async function fetchArcgisBBox(baseUrl, bbox) {
      // bbox: [xmin, ymin, xmax, ymax] in WGS84
      const [xmin, ymin, xmax, ymax] = bbox;
      const params = new URLSearchParams({
        f: 'geojson',
        outFields: '*',
        geometry: `${xmin},${ymin},${xmax},${ymax}`,
        geometryType: 'esriGeometryEnvelope',
        inSR: '4326',
        spatialRel: 'esriSpatialRelIntersects'
      });
      const url = `${baseUrl}?${params.toString()}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`ArcGIS bbox fetch failed: ${res.status}`);
      return res.json();
    }

    // Helper: create a geojson layer from data using the same options used by loadGeoJSON
    function createGeoJSONLayerFromData(data) {
      if (!data || !data.features) return L.geoJSON();
      return L.geoJSON(data, {
        style: (feature) => {
          const props = (feature && feature.properties) || {};
          return {
            color: props.color || '#b30000',
            weight: 1,
            fillColor: props.color || '#ff0000',
            fillOpacity: (props.fillOpacity !== undefined) ? props.fillOpacity : 0.35
          };
        },
        pointToLayer: (feature, latlng) => {
          const props = (feature && feature.properties) || {};
          if (feature && feature.geometry && feature.geometry.type === 'Point' && props.radius_m) {
            const c = L.circle(latlng, {
              radius: Number(props.radius_m) || 0,
              color: props.color || '#b30000',
              weight: 2,
              fillColor: props.color || '#ff0000',
              fillOpacity: (props.fillOpacity !== undefined) ? props.fillOpacity : 0.28
            });
            const pid = props.pattern === 'striped' ? ensureStripedPattern(props.color || '#ff0000') : null;
            c.once('add', () => {
              const el = c.getElement();
              if (!el) return;
              if (pid) el.setAttribute('fill', `url(#${pid})`);
              else c.bringToFront();
            });
            return c;
          }
          return L.marker(latlng);
        },
        onEachFeature: (feature, lyr) => {
          const props = feature.properties || {};
          lyr.bindPopup(popupHTML(props) + `<pre style="max-width:320px;margin-top:6px;">${JSON.stringify(props,null,2)}</pre>`, { maxWidth: 400 });
          lyr.once('add', () => {
            const el = lyr.getElement && lyr.getElement();
            if (el) {
              if (props.pattern === 'striped') {
                const pid = ensureStripedPattern(props.color || '#ff0000');
                el.setAttribute('fill', `url(#${pid})`);
              } else {
                if (lyr.bringToFront) lyr.bringToFront();
              }
            }
            try {
              const geomType = feature && feature.geometry && feature.geometry.type;
              if ((geomType === 'Polygon' || geomType === 'MultiPolygon') && props.CEILING !== undefined && props.CEILING !== null && String(props.CEILING).trim() !== '') {
                const center = (lyr.getBounds && lyr.getBounds().getCenter()) || null;
                if (center) {
                  const label = L.marker(center, {
                    interactive: false,
                    keyboard: false,
                    icon: L.divIcon({ className: 'feature-label', html: `<div>${String(props.CEILING)}</div>` })
                  });
                  lyr._ceilingLabel = label;
                  lyr.on('remove', () => { if (lyr._ceilingLabel) map.removeLayer(lyr._ceilingLabel); });
                  if (LABELS_ENABLED && map.getZoom() >= LABEL_MIN_ZOOM) map.addLayer(lyr._ceilingLabel);
                }
              }
            } catch (e) { console.warn('Failed to add CEILING label', e); }
          });
        }
      });
    }

    // Debounced viewport loader for ArcGIS features
    let _arcgisViewportTimer = null;
    async function updateArcgisViewport() {
      if (_arcgisViewportTimer) clearTimeout(_arcgisViewportTimer);
      _arcgisViewportTimer = setTimeout(async () => {
        try {
          const b = map.getBounds();
          const bbox = [b.getWest(), b.getSouth(), b.getEast(), b.getNorth()];
          // determine tiles that cover viewport and fetch/cache them
          const tiles = tilesForBbox(bbox, ARC_CACHE_GRID_DEG);
          const promises = tiles.map(([tx, ty]) => fetchArcgisTile(ARC_GIS_BASE, tx, ty));
          const results = await Promise.all(promises);
          // merge features and dedupe by OBJECTID if present
          const features = [];
          const seen = new Set();
          for (const res of results) {
            if (!res || !res.features) continue;
            for (const f of res.features) {
              const id = (f.properties && (f.properties.OBJECTID || f.properties.objectid || f.properties.OBJECTID_)) || f.id || JSON.stringify(f.geometry);
              if (seen.has(id)) continue;
              seen.add(id);
              features.push(f);
            }
          }
          const data = { type: 'FeatureCollection', features };
          // Clear previous data and add new
          FAA_UAS_FacilityMap_Data_layer.clearLayers();
          const layer = createGeoJSONLayerFromData(data);
          layer.eachLayer(l => FAA_UAS_FacilityMap_Data_layer.addLayer(l));
          updateLabelVisibility();
        } catch (e) { console.warn('ArcGIS viewport load failed', e); }
      }, 250);
    }

    // initial load for the current viewport
    updateArcgisViewport();

    // update on moveend / zoomend
    map.on('moveend', updateArcgisViewport);
    map.on('zoomend', updateArcgisViewport);

    // Map named variables: assume `test.geojson` is FAA/test data
    const National_Security_UAS_Flight_Restrictions_layer = National_Security_UAS_Flight_Restrictions || null;
    const faaLayer = testLayer || null;

    if (faaLayer) overlays['FAA Zones'] = faaLayer;
    if (FAA_UAS_FacilityMap_Data_layer) overlays['FAA UAS Facility Map'] = FAA_UAS_FacilityMap_Data_layer;
    if (National_Security_UAS_Flight_Restrictions) overlays['National Security UAS Flight Restrictions'] = National_Security_UAS_Flight_Restrictions_layer;
    if (easaLayer) overlays['EASA Zones'] = easaLayer;
    if (djiLayer) overlays['DJI Zones'] = djiLayer;

    // add any loaded layers to map
    if (faaLayer) faaLayer.addTo(map);
    if (FAA_UAS_FacilityMap_Data_layer) FAA_UAS_FacilityMap_Data_layer.addTo(map);
    if (National_Security_UAS_Flight_Restrictions_layer) National_Security_UAS_Flight_Restrictions_layer.addTo(map);
    if (easaLayer) easaLayer.addTo(map);
    if (djiLayer) djiLayer.addTo(map);

      // Helper: show/hide CEILING labels depending on zoom
      function updateLabelVisibility() {
        try {
          const minZoom = LABEL_MIN_ZOOM;
          Object.values(overlays).forEach(layer => {
            if (!layer || !layer.eachLayer) return;
            layer.eachLayer(l => {
              if (l && l._ceilingLabel) {
                const hasLabelOnMap = map.hasLayer(l._ceilingLabel);
                if (map.getZoom() >= minZoom && !hasLabelOnMap) map.addLayer(l._ceilingLabel);
                if (map.getZoom() < minZoom && hasLabelOnMap) map.removeLayer(l._ceilingLabel);
              }
              // If polygon layer has no SVG element, try to nudge style to force render and log
              const geomType = l.feature && l.feature.geometry && l.feature.geometry.type;
              if ((geomType === 'Polygon' || geomType === 'MultiPolygon') && (!l.getElement || !l.getElement())) {
                // attempt to set style as a nudge
                try { if (l.setStyle) l.setStyle({ weight: 1, fillOpacity: 0.35 }); } catch (e) {}
                console.warn('Polygon layer may not have an SVG element yet (possible renderer or loading issue):', l.feature && l.feature.id || l.feature && l.feature.properties && l.feature.properties.name);
              }
            });
          });
        } catch (e) { console.warn('updateLabelVisibility error', e); }
      }

      map.on('zoomend', updateLabelVisibility);
      // initial call
      updateLabelVisibility();

      // wire the labels toggle UI
      const labelsToggleEl = document.getElementById('labelsToggle');
      if (labelsToggleEl) {
        labelsToggleEl.addEventListener('change', (e) => {
          LABELS_ENABLED = !!e.target.checked;
          updateLabelVisibility();
        });
      }

    L.control.layers(null, overlays, { collapsed: false }).addTo(map);

    // Fit bounds to any loaded layers
    const layersToGroup = [faaLayer, FAA_UAS_FacilityMap_Data_layer, National_Security_UAS_Flight_Restrictions_layer, easaLayer, djiLayer].filter(l => l);
    if (layersToGroup.length) {
      const group = L.featureGroup(layersToGroup.map(l => l.getLayers ? l.getLayers() : [])
        .flat()
        .map(g => (g instanceof L.Layer ? g : null))
        .filter(Boolean)
      );
      if (group.getLayers().length) map.fitBounds(group.getBounds(), { padding: [20, 20] });
    }

    document.getElementById('resetBtn').onclick = () => {
      map.setView([20, 0], 2);
    };

    async function searchLocation(query) {
      const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&q=${encodeURIComponent(query)}`;
      const res = await fetch(url, {
        headers: { 'Accept': 'application/json' }
      });
      const results = await res.json();
      if (!results.length) {
        alert('Location not found');
        return;
      }
      const first = results[0];
      const lat = parseFloat(first.lat);
      const lon = parseFloat(first.lon);
      map.setView([lat, lon], 10);
      L.marker([lat, lon]).addTo(map).bindPopup(first.display_name).openPopup();
    }

    document.getElementById('searchBtn').onclick = () => {
      const q = document.getElementById('searchInput').value.trim();
      if (q) searchLocation(q);
    };

    document.getElementById('searchInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });
    })();
  </script>
</body>
</html>
