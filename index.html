<div id="map" style="height: 100vh;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<script>
const map = L.map('map').setView([39.5, -98.5], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const layerUrl = 'https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/arcgis/rest/services/FAA_UAS_FacilityMap_Data/FeatureServer/0/query';
const pageSize = 2000;

function toQuery(params) {
  return new URLSearchParams(params).toString();
}

async function fetchAllFeatures() {
  let allFeatures = [];
  let offset = 0;

  while (true) {
    const url = `${layerUrl}?${toQuery({
      f: 'geojson',
      where: '1=1',
      outFields: '*',
      returnGeometry: 'true',
      outSR: '4326',
      resultOffset: offset,
      resultRecordCount: pageSize,
      orderByFields: 'OBJECTID ASC'
    })}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error(`Request failed: ${res.status}`);

    const data = await res.json();
    console.log('page', offset, data);

    if (!data.features || data.features.length === 0) break;

    allFeatures.push(...data.features);

    if (data.features.length < pageSize) break;
    offset += pageSize;
  }

  return {
    type: 'FeatureCollection',
    features: allFeatures
  };
}

async function init() {
  try {
    const geojson = await fetchAllFeatures();

    console.log('total features', geojson.features.length);
    console.log('first feature', geojson.features[0]);

    const layer = L.geoJSON(geojson, {
      style: {
        color: '#3388ff',
        weight: 1,
        fillOpacity: 0.2
      }
    }).addTo(map);

    if (layer.getBounds().isValid()) {
      map.fitBounds(layer.getBounds());
    } else {
      console.warn('No valid bounds from GeoJSON');
    }
  } catch (err) {
    console.error(err);
    alert(err.message);
  }
}

init();
</script>
