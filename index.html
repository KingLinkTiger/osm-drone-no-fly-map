<div id="map" style="height: 100vh;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<script>
const map = L.map('map').setView([38.9072, -77.0369], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const layerUrl = 'https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/arcgis/rest/services/FAA_UAS_FacilityMap_Data/FeatureServer/0/query';
const pageSize = 2000;

let geoJsonLayer = L.geoJSON(null, {
  style: {
    color: '#3388ff',
    weight: 1,
    fillOpacity: 0.2
  }
}).addTo(map);

let requestToken = 0;

function toQuery(params) {
  return new URLSearchParams(params).toString();
}

function boundsToArcGISExtent(bounds) {
  const sw = bounds.getSouthWest();
  const ne = bounds.getNorthEast();
  return {
    xmin: sw.lng,
    ymin: sw.lat,
    xmax: ne.lng,
    ymax: ne.lat,
    spatialReference: { wkid: 4326 }
  };
}

async function fetchVisibleFeatures() {
  const token = ++requestToken;
  const bounds = map.getBounds();
  const extent = boundsToArcGISExtent(bounds);
  let allFeatures = [];
  let offset = 0;

  while (true) {
    const url = `${layerUrl}?${toQuery({
      f: 'geojson',
      where: '1=1',
      outFields: '*',
      returnGeometry: 'true',
      geometry: JSON.stringify(extent),
      geometryType: 'esriGeometryEnvelope',
      spatialRel: 'esriSpatialRelIntersects',
      inSR: '4326',
      outSR: '4326',
      resultOffset: offset,
      resultRecordCount: pageSize,
      orderByFields: 'OBJECTID ASC'
    })}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error(`Request failed: ${res.status}`);

    const data = await res.json();
    if (token !== requestToken) return null;

    if (!data.features || data.features.length === 0) break;

    allFeatures.push(...data.features);

    if (data.features.length < pageSize) break;
    offset += pageSize;
  }

  return {
    type: 'FeatureCollection',
    features: allFeatures
  };
}

async function reloadVisibleFeatures() {
  try {
    const geojson = await fetchVisibleFeatures();
    if (!geojson) return;

    geoJsonLayer.clearLayers();
    geoJsonLayer.addData(geojson);
  } catch (err) {
    console.error(err);
  }
}

let timer = null;
function scheduleReload() {
  clearTimeout(timer);
  timer = setTimeout(reloadVisibleFeatures, 300);
}

map.on('moveend', scheduleReload);
reloadVisibleFeatures();
</script>
