<div id="map" style="height: 100vh;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  .ceiling-label {
    background: transparent;
    border: none;
    box-shadow: none;
    color: #111;
    font-size: 12px;
    font-weight: 600;
    text-shadow: 0 0 3px #fff, 0 0 3px #fff;
  }
</style>

<script>
const map = L.map('map').setView([38.9072, -77.0369], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const faaUrl = 'https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/arcgis/rest/services/FAA_UAS_FacilityMap_Data/FeatureServer/0/query';
const nsUrl = 'https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/arcgis/rest/services/DoD_Mar_13/FeatureServer/0/query';
const pageSize = 2000;
const labelZoom = 12;

let faaLayer = L.geoJSON(null, {
  style: { color: '#3388ff', weight: 1, fillOpacity: 0.2 }
});

let nsLayer = L.geoJSON(null, {
  style: { color: '#d7191c', weight: 1, fillOpacity: 0.15 }
});

let labelLayer = L.layerGroup();

let overlayBounds = {
  faa: null,
  ns: null
};

function toQuery(params) {
  return new URLSearchParams(params).toString();
}

function boundsToArcGISExtent(bounds) {
  const sw = bounds.getSouthWest();
  const ne = bounds.getNorthEast();
  return {
    xmin: sw.lng,
    ymin: sw.lat,
    xmax: ne.lng,
    ymax: ne.lat,
    spatialReference: { wkid: 4326 }
  };
}

async function fetchVisibleFeatures(layerUrl) {
  const bounds = map.getBounds();
  const extent = boundsToArcGISExtent(bounds);
  let allFeatures = [];
  let offset = 0;

  while (true) {
    const url = `${layerUrl}?${toQuery({
      f: 'geojson',
      where: '1=1',
      outFields: '*',
      returnGeometry: 'true',
      geometry: JSON.stringify(extent),
      geometryType: 'esriGeometryEnvelope',
      spatialRel: 'esriSpatialRelIntersects',
      inSR: '4326',
      outSR: '4326',
      resultOffset: offset,
      resultRecordCount: pageSize,
      orderByFields: 'OBJECTID ASC'
    })}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error(`Request failed: ${res.status}`);

    const data = await res.json();
    if (!data.features || data.features.length === 0) break;

    allFeatures.push(...data.features);

    if (data.features.length < pageSize) break;
    offset += pageSize;
  }

  return { type: 'FeatureCollection', features: allFeatures };
}

function updateLabels(geojson) {
  labelLayer.clearLayers();
  if (map.getZoom() < labelZoom) return;

  geojson.features.forEach(feature => {
    const ceiling = feature.properties?.CEILING;
    if (ceiling == null) return;

    const temp = L.geoJSON(feature);
    const center = temp.getBounds().getCenter();

    labelLayer.addLayer(
      L.marker(center, {
        interactive: false,
        icon: L.divIcon({
          className: 'ceiling-label',
          html: String(ceiling),
          iconSize: [0, 0]
        })
      })
    );
  });
}

async function reloadLayer(targetLayer, url, key) {
  const geojson = await fetchVisibleFeatures(url);
  targetLayer.clearLayers();
  targetLayer.addData(geojson);

  if (key === 'faa') overlayBounds.faa = geojson;
  if (key === 'ns') overlayBounds.ns = geojson;

  if (targetLayer === faaLayer) updateLabels(geojson);
}

async function reloadAll() {
  try {
    await Promise.all([
      reloadLayer(faaLayer, faaUrl, 'faa'),
      reloadLayer(nsLayer, nsUrl, 'ns')
    ]);
  } catch (err) {
    console.error(err);
  }
}

let timer = null;
function scheduleReload() {
  clearTimeout(timer);
  timer = setTimeout(reloadAll, 300);
}

map.on('moveend', scheduleReload);

map.on('zoomend', () => {
  const faaGeo = faaLayer.toGeoJSON();
  updateLabels(faaGeo);
});

const overlays = {
  'FAA FacilityMap': faaLayer,
  'National Security UAS Flight Restrictions': nsLayer,
  'CEILING Labels': labelLayer
};

L.control.layers(null, overlays, { position: 'topright', collapsed: false }).addTo(map);

reloadAll();
</script>
